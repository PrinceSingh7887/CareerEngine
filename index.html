<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      color: #14213d;
      background:
        linear-gradient(rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.9)),
        url("76824.jpg") center / cover fixed no-repeat;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 72px;
      color: #fff;
      background: #0f172a;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .brand {
      display: grid;
      gap: 2px;
      line-height: 1.2;
    }

    .brand-title {
      font-size: clamp(21px, 5vw, 30px);
      font-weight: 700;
    }

    .brand-subtitle {
      font-size: 13px;
      font-weight: 400;
      color: #cbd5e1;
    }

    #logo {
      position: absolute;
      left: 16px;
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 50%;
      background: #fff;
    }

    .menu-btn {
      position: absolute;
      right: 18px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 8px;
      background: #1e293b;
      color: #fff;
      cursor: pointer;
      font-size: 24px;
    }

    .menu-btn:hover {
      background: #2563eb;
    }

    #menu {
      position: fixed;
      top: 0;
      right: -290px;
      z-index: 1200;
      width: min(290px, 86vw);
      height: 100vh;
      padding: 26px;
      color: #fff;
      background: linear-gradient(180deg, #0f172a, #1e293b);
      box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
      transition: right 0.3s ease;
    }

    #menu.open {
